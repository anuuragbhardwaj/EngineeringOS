# Capability Map — Employees request capabilities; registry resolves MCPs
# Authority: mcp/capabilities.yaml
# Version: 1.0.0

version: "1.0.0"
updated: "2026-07-01"

# Resolution order: primary_mcp → fallback_chain (first installed wins)
# See mcp/selection-policy.md for conflict and offline rules

