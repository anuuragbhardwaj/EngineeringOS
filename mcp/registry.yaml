# MCP Registry — Canonical Catalog
# Authority: mcp/registry.yaml
# Version: 1.0.0
# Do not hardcode MCP names in employee prompts — use capabilities.yaml

version: "1.0.0"
updated: "2026-07-01"

defaults:
