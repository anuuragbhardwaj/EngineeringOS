[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "engineeringos"
version = "0.1.0"
description = "EngineeringOS CLI — primary interface for the AI Company Framework"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "company-core>=0.1.0",
    "typer>=0.12.0",
    "rich>=13.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
engineeringos = "company_cli.main:run"

[tool.setuptools.packages.find]
where = ["src"]
